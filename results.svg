  <text x="216" y="268" fill="#1a237e" font-size="13" font-weight="700">📋 Article-by-Article Results</text>

  <!-- Art.9 Non-compliant -->
  <rect x="216" y="278" width="668" height="42" fill="#ffebee" rx="8" stroke="#ef9a9a" stroke-width="1"/>
  <text x="232" y="297" fill="#c62828" font-size="11" font-weight="700">❌ Art.9 — Risk Management System  (0%)</text>
  <text x="232" y="313" fill="#555" font-size="9">No risk management system found. Bias testing and accuracy metrics are absent.</text>

  <!-- Art.10 Partial -->
  <rect x="216" y="326" width="668" height="42" fill="#fff8e1" rx="8" stroke="#ffe082" stroke-width="1"/>
  <text x="232" y="345" fill="#f9a825" font-size="11" font-weight="700">⚠️ Art.10 — Data and Data Governance  (50%)</text>
  <text x="232" y="361" fill="#555" font-size="9">Partial data governance: bias testing exists but formal governance policy is missing.</text>

  <!-- Art.11 Non-compliant -->
  <rect x="216" y="374" width="668" height="42" fill="#ffebee" rx="8" stroke="#ef9a9a" stroke-width="1"/>
  <text x="232" y="393" fill="#c62828" font-size="11" font-weight="700">❌ Art.11 — Technical Documentation  (0%)</text>
  <text x="232" y="409" fill="#555" font-size="9">No technical documentation found. Mandatory before market placement.</text>

  <!-- Art.14 Compliant -->
  <rect x="216" y="422" width="668" height="42" fill="#e8f5e9" rx="8" stroke="#a5d6a7" stroke-width="1"/>
  <text x="232" y="441" fill="#2e7d32" font-size="11" font-weight="700">✅ Art.14 — Human Oversight  (100%)</text>
  <text x="232" y="457" fill="#555" font-size="9">Human oversight mechanisms implemented — monitoring, pause and override capabilities confirmed.</text>

  <!-- Gap analysis preview -->
  <rect x="216" y="472" width="668" height="50" fill="#e3f2fd" rx="8" stroke="#1565c0" stroke-width="1"/>
  <text x="232" y="490" fill="#1565c0" font-size="10" font-weight="700">🤖 AI Gap Analysis</text>
  <text x="232" y="506" fill="#333" font-size="9">The primary compliance gaps are in risk management (Art.9) and technical documentation (Art.11).</text>
  <text x="232" y="518" fill="#333" font-size="9">Immediate priority: establish a risk management system and create Annex IV documentation.</text>
