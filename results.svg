  <text x="484" y="100" fill="#555" font-size="11">HireBot AI — Employment Screening System</text>
  <text x="484" y="116" fill="#999" font-size="9">Assessment ID: a3f7b2c1</text>

  <!-- Bar chart -->
  <text x="468" y="152" fill="#444" font-size="10" font-weight="600">Article Check Summary</text>
  <!-- Compliant bar -->
  <rect x="510" y="160" width="90" height="14" fill="#2e7d32" rx="3"/>
  <text x="468" y="172" fill="#555" font-size="9">Compliant</text>
  <text x="606" y="172" fill="#555" font-size="9">3</text>
  <!-- Partial bar -->
  <rect x="510" y="178" width="50" height="14" fill="#f9a825" rx="3"/>
  <text x="468" y="190" fill="#555" font-size="9">Partial</text>
  <text x="566" y="190" fill="#555" font-size="9">2</text>
  <!-- Non-compliant bar -->
  <rect x="510" y="196" width="130" height="14" fill="#c62828" rx="3"/>
  <text x="468" y="208" fill="#555" font-size="9">Non-Compliant</text>
  <text x="646" y="208" fill="#555" font-size="9">4</text>
  <text x="468" y="228" fill="#999" font-size="8">Pass threshold: 60%</text>

