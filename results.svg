  <rect x="216" y="46" width="230" height="200" fill="white" rx="12" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Gauge arc background -->
  <path d="M 280 190 A 80 80 0 1 1 390 190" fill="none" stroke="#ffebee" stroke-width="20"/>
  <path d="M 280 190 A 80 80 0 0 1 300 124" fill="none" stroke="#fff8e1" stroke-width="20"/>
  <path d="M 300 124 A 80 80 0 0 1 390 190" fill="none" stroke="#e8f5e9" stroke-width="20"/>
  <!-- Score arc (74%) -->
  <path d="M 280 190 A 80 80 0 0 1 365 128" fill="none" stroke="#f9a825" stroke-width="20" stroke-linecap="round"/>
  <!-- Center text -->
  <text x="335" y="182" text-anchor="middle" fill="#1a237e" font-size="26" font-weight="800">74%</text>
  <text x="335" y="200" text-anchor="middle" fill="#888" font-size="9">Compliance Score</text>
  <!-- Verdict -->
  <text x="335" y="228" text-anchor="middle" fill="#f9a825" font-size="13" font-weight="800">⚠️ REQUIRES ACTION</text>

  <!-- Risk tier box -->
  <rect x="456" y="46" width="428" height="200" fill="white" rx="12" stroke="#e0e0e0" stroke-width="1"/>
  <!-- High risk banner -->
  <rect x="468" y="58" width="404" height="68" fill="#fff3e0" rx="8" stroke="#e65100" stroke-width="1"/>
  <rect x="468" y="58" width="5" height="68" fill="#e65100" rx="3 0 0 3"/>
