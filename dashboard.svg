<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter,Arial,sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#f0f2f6" rx="12"/>

  <!-- Sidebar -->
  <rect width="200" height="520" fill="#0d1b2a" rx="12 0 0 12"/>
  <text x="100" y="50" text-anchor="middle" font-size="28">🇪🇺</text>
  <text x="100" y="78" text-anchor="middle" fill="white" font-size="13" font-weight="700">EU AI Act</text>
  <text x="100" y="94" text-anchor="middle" fill="#aab" font-size="10">Compliance Platform</text>
  <line x1="20" y1="110" x2="180" y2="110" stroke="#2a3a5a" stroke-width="1"/>

  <!-- Sidebar nav items -->
  <rect x="12" y="120" width="176" height="30" fill="#1a237e" rx="6"/>
  <text x="26" y="140" fill="white" font-size="11" font-weight="700">🏠 Home</text>
  <text x="26" y="170" fill="#aab" font-size="11">🔍 New Assessment</text>
  <text x="26" y="198" fill="#aab" font-size="11">📊 Results Dashboard</text>
  <text x="26" y="226" fill="#aab" font-size="11">📁 My Projects</text>
  <text x="26" y="254" fill="#aab" font-size="11">📖 EU AI Act Guide</text>

  <!-- Main content -->
  <!-- Hero -->
  <rect x="216" y="16" width="668" height="90" fill="url(#heroGrad)" rx="14"/>
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1a237e"/>
    </linearGradient>
  </defs>
  <text x="240" y="50" fill="white" font-size="18" font-weight="800">🇪🇺 EU AI Act Compliance Platform</text>
  <text x="240" y="72" fill="#aac" font-size="11">Self-service assessment tool — Regulation (EU) 2024/1689</text>
  <text x="240" y="92" fill="#889" font-size="10">Determine your AI project's risk tier, compliance gaps, and readiness score</text>

  <!-- Stat cards -->
  <rect x="216" y="122" width="152" height="72" fill="white" rx="12" stroke="#e0e0e0" stroke-width="1"/>
  <text x="292" y="152" text-anchor="middle" fill="#1a237e" font-size="28" font-weight="800">4</text>
  <text x="292" y="172" text-anchor="middle" fill="#888" font-size="10">Projects Submitted</text>

  <rect x="378" y="122" width="152" height="72" fill="white" rx="12" stroke="#e0e0e0" stroke-width="1"/>
  <text x="454" y="152" text-anchor="middle" fill="#1a237e" font-size="28" font-weight="800">3</text>
  <text x="454" y="172" text-anchor="middle" fill="#888" font-size="10">Assessments Run</text>

  <rect x="540" y="122" width="152" height="72" fill="white" rx="12" stroke="#e0e0e0" stroke-width="1"/>
  <text x="616" y="152" text-anchor="middle" fill="#2e7d32" font-size="28" font-weight="800">2</text>
  <text x="616" y="172" text-anchor="middle" fill="#888" font-size="10">Passed (≥60%)</text>

  <rect x="702" y="122" width="182" height="72" fill="white" rx="12" stroke="#e0e0e0" stroke-width="1"/>
  <text x="793" y="152" text-anchor="middle" fill="#1a237e" font-size="28" font-weight="800">74%</text>
  <text x="793" y="172" text-anchor="middle" fill="#888" font-size="10">Avg Compliance Score</text>

  <!-- Risk tier cards -->
  <text x="216" y="222" fill="#1a237e" font-size="13" font-weight="700">Risk Tier Overview</text>

  <!-- Unacceptable -->
  <rect x="216" y="232" width="660" height="54" fill="white" rx="10" stroke="#eee" stroke-width="1"/>
  <rect x="216" y="232" width="5" height="54" fill="#c62828" rx="3 0 0 3"/>
  <text x="232" y="255" fill="#c62828" font-size="12" font-weight="700">🔴 Unacceptable Risk</text>
  <rect x="730" y="240" width="130" height="20" fill="#c62828" rx="10"/>
  <text x="795" y="255" text-anchor="middle" fill="white" font-size="9" font-weight="700">PROHIBITED</text>
  <text x="232" y="274" fill="#666" font-size="9">Social scoring · Real-time biometrics in public · Subliminal manipulation</text>

  <!-- High Risk -->
  <rect x="216" y="292" width="660" height="54" fill="white" rx="10" stroke="#eee" stroke-width="1"/>
  <rect x="216" y="292" width="5" height="54" fill="#e65100" rx="3 0 0 3"/>
  <text x="232" y="315" fill="#e65100" font-size="12" font-weight="700">🟠 High Risk</text>
  <rect x="700" y="300" width="160" height="20" fill="#e65100" rx="10"/>
  <text x="780" y="315" text-anchor="middle" fill="white" font-size="9" font-weight="700">FULL COMPLIANCE</text>
  <text x="232" y="334" fill="#666" font-size="9">Hiring AI · Medical devices · Credit scoring · Education · Law enforcement</text>

  <!-- Limited Risk -->
  <rect x="216" y="352" width="660" height="54" fill="white" rx="10" stroke="#eee" stroke-width="1"/>
  <rect x="216" y="352" width="5" height="54" fill="#f9a825" rx="3 0 0 3"/>
  <text x="232" y="375" fill="#f9a825" font-size="12" font-weight="700">🟡 Limited Risk</text>
  <rect x="710" y="360" width="150" height="20" fill="#f9a825" rx="10"/>
  <text x="785" y="375" text-anchor="middle" fill="white" font-size="9" font-weight="700">TRANSPARENCY</text>
  <text x="232" y="394" fill="#666" font-size="9">Chatbots · Deepfakes · Recommendation systems · Emotion recognition</text>

  <!-- Minimal Risk -->
  <rect x="216" y="412" width="660" height="54" fill="white" rx="10" stroke="#eee" stroke-width="1"/>
  <rect x="216" y="412" width="5" height="54" fill="#2e7d32" rx="3 0 0 3"/>
  <text x="232" y="435" fill="#2e7d32" font-size="12" font-weight="700">🟢 Minimal Risk</text>
  <rect x="690" y="420" width="170" height="20" fill="#2e7d32" rx="10"/>
  <text x="775" y="435" text-anchor="middle" fill="white" font-size="9" font-weight="700">NO OBLIGATIONS</text>
  <text x="232" y="454" fill="#666" font-size="9">Spam filters · AI in games · Non-personalised content recommendation</text>

  <!-- Key dates box -->
  <rect x="216" y="474" width="660" height="36" fill="#e3f2fd" rx="8" stroke="#1565c0" stroke-width="1"/>
  <text x="232" y="497" fill="#1565c0" font-size="10" font-weight="700">📅 Key Dates: Feb 2025 — Art.5 applies · Aug 2025 — GPAI applies · Aug 2026 — High-risk fully applies</text>
</svg>
