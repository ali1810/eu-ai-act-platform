<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter,Arial,sans-serif">
  <rect width="900" height="560" fill="#f0f2f6" rx="12"/>

  <!-- Sidebar -->
  <rect width="200" height="560" fill="#0d1b2a" rx="12 0 0 12"/>
  <text x="100" y="50" text-anchor="middle" font-size="26">🇪🇺</text>
  <text x="100" y="74" text-anchor="middle" fill="white" font-size="13" font-weight="700">EU AI Act</text>
  <text x="100" y="90" text-anchor="middle" fill="#aab" font-size="10">Compliance Platform</text>
  <line x1="20" y1="106" x2="180" y2="106" stroke="#2a3a5a" stroke-width="1"/>
  <text x="26" y="130" fill="#aab" font-size="11">🏠 Home</text>
  <rect x="12" y="142" width="176" height="28" fill="#1a237e" rx="6"/>
  <text x="26" y="161" fill="white" font-size="11" font-weight="700">🔍 New Assessment</text>
  <text x="26" y="192" fill="#aab" font-size="11">📊 Results Dashboard</text>
  <text x="26" y="220" fill="#aab" font-size="11">📁 My Projects</text>
  <text x="26" y="248" fill="#aab" font-size="11">📖 EU AI Act Guide</text>

  <!-- Main content -->
  <text x="216" y="38" fill="#1a237e" font-size="18" font-weight="800">🔍 New Compliance Assessment</text>
  <text x="216" y="56" fill="#888" font-size="10">Submit your AI project to get a risk classification, article-by-article compliance check, and readiness score.</text>

  <!-- Form box -->
  <rect x="216" y="68" width="668" height="460" fill="white" rx="14" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Section 1: Project Info -->
  <text x="236" y="96" fill="#1a237e" font-size="13" font-weight="700">📋 Project Information</text>

  <!-- Left column fields -->
  <text x="236" y="118" fill="#333" font-size="10" font-weight="600">Project Name *</text>
  <rect x="236" y="122" width="300" height="28" fill="#f8f9fa" rx="6" stroke="#dee2e6" stroke-width="1"/>
  <text x="246" y="141" fill="#999" font-size="10">e.g. HireBot AI, MedScan Pro</text>

  <text x="236" y="168" fill="#333" font-size="10" font-weight="600">AI Category *</text>
  <rect x="236" y="172" width="300" height="28" fill="#f8f9fa" rx="6" stroke="#dee2e6" stroke-width="1"/>
  <text x="246" y="191" fill="#555" font-size="10">employment ▾</text>

  <text x="236" y="218" fill="#333" font-size="10" font-weight="600">Deployer Type *</text>
  <rect x="236" y="222" width="300" height="28" fill="#f8f9fa" rx="6" stroke="#dee2e6" stroke-width="1"/>
  <text x="246" y="241" fill="#555" font-size="10">private_company ▾</text>

  <!-- Right column fields -->
  <text x="556" y="118" fill="#333" font-size="10" font-weight="600">Description *</text>
  <rect x="556" y="122" width="308" height="76" fill="#f8f9fa" rx="6" stroke="#dee2e6" stroke-width="1"/>
  <text x="566" y="142" fill="#999" font-size="9">AI system that screens CVs and ranks</text>
  <text x="566" y="156" fill="#999" font-size="9">job applicants for HR departments...</text>

  <text x="556" y="218" fill="#333" font-size="10" font-weight="600">Intended Use</text>
  <rect x="556" y="222" width="308" height="28" fill="#f8f9fa" rx="6" stroke="#dee2e6" stroke-width="1"/>
  <text x="566" y="241" fill="#999" font-size="10">Screen job applicants for HR</text>

  <!-- Divider -->
  <line x1="236" y1="268" x2="864" y2="268" stroke="#eee" stroke-width="1"/>
  <text x="236" y="288" fill="#1a237e" font-size="13" font-weight="700">⚙️ System Characteristics</text>

  <!-- Checkboxes row 1 -->
  <rect x="236" y="300" width="12" height="12" fill="white" rx="2" stroke="#1a237e" stroke-width="1.5"/>
  <text x="254" y="312" fill="#333" font-size="10">Processes personal data</text>
  <rect x="236" y="320" width="12" height="12" fill="#1a237e" rx="2"/>
  <text x="248" y="330" fill="white" font-size="9" font-weight="700">✓</text>
  <text x="254" y="332" fill="#333" font-size="10">Processes biometric data</text>
  <rect x="236" y="340" width="12" height="12" fill="#1a237e" rx="2"/>
  <text x="248" y="350" fill="white" font-size="9" font-weight="700">✓</text>
  <text x="254" y="352" fill="#333" font-size="10">Makes autonomous decisions</text>

  <rect x="440" y="300" width="12" height="12" fill="white" rx="2" stroke="#1a237e" stroke-width="1.5"/>
  <text x="458" y="312" fill="#333" font-size="10">Affects fundamental rights</text>
  <rect x="440" y="320" width="12" height="12" fill="#1a237e" rx="2"/>
  <text x="452" y="330" fill="white" font-size="9" font-weight="700">✓</text>
  <text x="458" y="332" fill="#333" font-size="10">Operates in real-time</text>

  <rect x="640" y="300" width="12" height="12" fill="white" rx="2" stroke="#1a237e" stroke-width="1.5"/>
  <text x="658" y="312" fill="#333" font-size="10">Human oversight in place</text>
  <rect x="640" y="320" width="12" height="12" fill="white" rx="2" stroke="#1a237e" stroke-width="1.5"/>
  <text x="658" y="332" fill="#333" font-size="10">Technical documentation</text>
  <rect x="640" y="340" width="12" height="12" fill="white" rx="2" stroke="#1a237e" stroke-width="1.5"/>
  <text x="658" y="352" fill="#333" font-size="10">Logging &amp; monitoring</text>

  <!-- Divider -->
  <line x1="236" y1="372" x2="864" y2="372" stroke="#eee" stroke-width="1"/>
  <text x="236" y="392" fill="#1a237e" font-size="13" font-weight="700">✅ Compliance Measures Already Implemented</text>

  <!-- Compliance checkboxes -->
  <rect x="236" y="404" width="12" height="12" fill="white" rx="2" stroke="#1a237e" stroke-width="1.5"/>
  <text x="254" y="416" fill="#333" font-size="10">Data governance framework</text>
  <rect x="236" y="424" width="12" height="12" fill="white" rx="2" stroke="#1a237e" stroke-width="1.5"/>
  <text x="254" y="436" fill="#333" font-size="10">Accuracy metrics &amp; benchmarks</text>

  <rect x="440" y="404" width="12" height="12" fill="white" rx="2" stroke="#1a237e" stroke-width="1.5"/>
  <text x="458" y="416" fill="#333" font-size="10">Bias testing &amp; fairness evaluation</text>
  <rect x="440" y="424" width="12" height="12" fill="white" rx="2" stroke="#1a237e" stroke-width="1.5"/>
  <text x="458" y="436" fill="#333" font-size="10">Explainability / interpretability</text>

  <rect x="640" y="404" width="12" height="12" fill="white" rx="2" stroke="#1a237e" stroke-width="1.5"/>
  <text x="658" y="416" fill="#333" font-size="10">User notification (AI disclosure)</text>
  <rect x="640" y="424" width="12" height="12" fill="white" rx="2" stroke="#1a237e" stroke-width="1.5"/>
  <text x="658" y="436" fill="#333" font-size="10">Conformity assessment conducted</text>

  <!-- Submit button -->
  <rect x="236" y="456" width="250" height="40" fill="#1a237e" rx="8"/>
  <text x="361" y="481" text-anchor="middle" fill="white" font-size="12" font-weight="700">🚀 Run Assessment</text>
</svg>
